services:
  app:
    build:
      context: ./web
      target: dev
    container_name: ghota-app
    ports:
      - "9000:9000"
      - "5173:5173"
    volumes:
      - ./web:/var/www/html
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=pgsql
      - DB_HOST=pgsql
      - DB_PORT=5432
      - DB_DATABASE=ghota
      - DB_USERNAME=ghota
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=redis
      - CACHE_STORE=redis
      - MAIL_MAILER=smtp
      - MAIL_HOST=smtp.gmail.com
      - MAIL_PORT=587
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_ENCRYPTION=tls
      - MAIL_FROM_ADDRESS=${MAIL_USERNAME}
      - MAIL_FROM_NAME=Ghota
    depends_on:
      pgsql:
        condition: service_healthy
      redis:
        condition: service_started
      mailpit:
        condition: service_started
    networks:
      - ghota-network

  app-2:
    build:
      context: ./web
      target: dev
    container_name: ghota-app-2
    volumes:
      - ./web:/var/www/html
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=pgsql
      - DB_HOST=pgsql
      - DB_PORT=5432
      - DB_DATABASE=ghota
      - DB_USERNAME=ghota
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=redis
      - CACHE_STORE=redis
      - SESSION_DRIVER=redis
    depends_on:
      pgsql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - ghota-network

  nginx:
    image: nginx:alpine
    container_name: ghota-nginx
    ports:
      - "8080:80"
      - "8082:8082"
    volumes:
      - ./web:/var/www/html
      - ./web/docker/nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - app
    networks:
      - ghota-network

  pgsql:
    image: postgres:17-alpine
    container_name: ghota-pgsql
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ghota
      POSTGRES_USER: ghota
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgsql-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ghota -d ghota"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ghota-network

  reverb:
    build:
      context: ./web
      target: dev
    container_name: ghota-reverb
    ports:
      - "8081:8081"
    volumes:
      - ./web:/var/www/html
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=pgsql
      - DB_HOST=pgsql
      - DB_PORT=5432
      - DB_DATABASE=ghota
      - DB_USERNAME=ghota
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=redis
      - CACHE_STORE=redis
    command: php artisan reverb:start --debug
    depends_on:
      pgsql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - ghota-network

  redis:
    image: redis:7-alpine
    container_name: ghota-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - ghota-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  reverb-2:
    build:
      context: ./web
      target: dev
    container_name: ghota-reverb-2
    volumes:
      - ./web:/var/www/html
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=pgsql
      - DB_HOST=pgsql
      - DB_PORT=5432
      - DB_DATABASE=ghota
      - DB_USERNAME=ghota
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=redis
      - CACHE_STORE=redis
      - REVERB_SCALING_ENABLED=true
    command: php artisan reverb:start --debug
    depends_on:
      pgsql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - ghota-network

  worker:
    build:
      context: ./web
      target: dev
    container_name: ghota-worker
    volumes:
      - ./web:/var/www/html
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=pgsql
      - DB_HOST=pgsql
      - DB_PORT=5432
      - DB_DATABASE=ghota
      - DB_USERNAME=ghota
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=redis
      - CACHE_STORE=redis
    command: php artisan queue:listen --tries=1 --timeout=0
    depends_on:
      pgsql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - ghota-network

  mailpit:
    image: axllent/mailpit:latest
    container_name: ghota-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - ghota-network

volumes:
  pgsql-data:
  redis-data:

networks:
  ghota-network:
    driver: bridge
